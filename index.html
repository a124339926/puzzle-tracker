<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>36字元排列猜謎追蹤器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:'SF Mono','Consolas',monospace;padding:20px;max-width:1200px;margin:0 auto}
h1{color:#58a6ff;font-size:20px;margin-bottom:4px}
.sub{color:#8b949e;font-size:13px;margin-bottom:16px}
.panel{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px;margin-bottom:14px}
.panel h2{font-size:14px;color:#58a6ff;margin-bottom:8px}
.row{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
input,button{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:8px 12px;border-radius:6px;font-family:inherit;font-size:13px}
input:focus{outline:none;border-color:#58a6ff}
button{cursor:pointer;background:#238636;border-color:#2ea043;color:#fff;font-weight:bold}
button:hover{background:#2ea043}
button.secondary{background:#21262d;border-color:#30363d;color:#c9d1d9}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:5px 8px;text-align:left;border-bottom:1px solid #30363d}
th{color:#8b949e;font-weight:normal;font-size:11px}
.guess-str{font-size:11px;word-break:break-all;max-width:280px}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:bold}
.badge-a{background:#1a3a2a;color:#3fb950}
.badge-b{background:#1a2a3a;color:#58a6ff}
.progress-bar{height:5px;background:#21262d;border-radius:3px;margin:8px 0;overflow:hidden}
.progress-fill{height:100%;background:#58a6ff;transition:width .3s}
.stats{display:flex;gap:20px;flex-wrap:wrap}
.stat{text-align:center}
.stat-val{font-size:24px;font-weight:bold;color:#58a6ff}
.stat-label{font-size:11px;color:#8b949e}
#charGrid{display:flex;flex-wrap:wrap;gap:3px}
.char-box{width:32px;height:32px;border:1px solid #30363d;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;background:#0d1117;position:relative}
.char-box.tested{background:#1a1a2e;border-color:#4a4a6e;color:#8b949e}
.char-box.confirmed{background:#1a3a2a;border-color:#3fb950;color:#3fb950}
.char-box.candidate{background:#1a2a1a;border-color:#2ea043;color:#7ee787}
.char-box.excluded{opacity:0.25;text-decoration:line-through}
.char-box.locked{background:#1a2a3a;border-color:#58a6ff;color:#58a6ff}
#posGrid{display:grid;grid-template-columns:repeat(9,1fr);gap:4px}
.pos-cell{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:5px;min-height:50px;font-size:11px}
.pos-cell.locked-pos{border-color:#58a6ff;background:#121d2a}
.pos-num{color:#8b949e;font-size:10px;margin-bottom:2px}
.pos-locked{color:#58a6ff;font-weight:bold;font-size:16px;text-align:center;margin:4px 0}
.pos-chars{color:#c9d1d9;word-break:break-all}
#nextGuess{font-size:16px;letter-spacing:1px;word-break:break-all;background:#0d1117;padding:10px;border-radius:6px;border:1px solid #30363d;margin:8px 0;line-height:2}
#nextGuess span{display:inline-block;width:30px;text-align:center;padding:2px 0;margin:1px;border-radius:3px;font-size:13px}
#nextGuess span.locked-pos{background:#1a2a3a;color:#58a6ff}
#nextGuess span.new-pos{background:#0d1117}
.phase-tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:bold}
.phase-find{background:#3a1a2a;color:#f0883e}
.phase-locate{background:#1a3a2a;color:#3fb950}
.warn{color:#f0883e;font-size:12px}
</style>
</head>
<body>

<h1>36字元排列猜謎追蹤器</h1>
<p class="sub">0-9 + A-Z + a-z → 隨機選36字元排列 | 上限200次測試</p>

<div class="row">
  <div class="panel" style="flex:1;min-width:280px">
    <h2>狀態</h2>
    <div class="stats">
      <div class="stat"><div class="stat-val" id="stTries">0</div><div class="stat-label">已用次數</div></div>
      <div class="stat"><div class="stat-val" id="stRemain">200</div><div class="stat-label">剩餘</div></div>
      <div class="stat"><div class="stat-val" id="stFound">0</div><div class="stat-label">已確認字元</div></div>
      <div class="stat"><div class="stat-val" id="stLocked">0</div><div class="stat-label">已鎖定位置</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
    <span class="phase-tag phase-find" id="phaseTag">找字元階段</span>
  </div>
  <div class="panel" style="flex:1;min-width:280px">
    <h2>輸入測試結果</h2>
    <div class="row">
      <input type="text" id="guessInput" placeholder="貼上測試字串(36字元)" style="flex:3">
      <input type="number" id="AInput" placeholder="A" style="width:55px" min="0" max="36">
      <input type="number" id="BInput" placeholder="B" style="width:55px" min="0" max="36">
      <button onclick="addResult()">記錄</button>
    </div>
    <p class="warn" id="warnMsg"></p>
  </div>
</div>

<div class="panel">
  <h2>下一推薦測試 <button onclick="copyGuess()" class="secondary sm" style="margin-left:8px">複製</button></h2>
  <div id="nextGuess">載入中...</div>
  <p style="font-size:11px;color:#8b949e;margin-top:4px" id="strategyHint"></p>
  <button onclick="genNext()" style="margin-top:6px">重新生成建議</button>
</div>

<div class="panel">
  <h2>字元追蹤 (62→36)</h2>
  <div id="charGrid"></div>
</div>

<div class="panel">
  <h2>位置追蹤 (每位置出現過的字元)</h2>
  <div id="posGrid"></div>
</div>

<div class="panel">
  <h2>歷史記錄</h2>
  <table><thead><tr><th>#</th><th>測試字串</th><th>A</th><th>B</th><th>匹配</th></tr></thead><tbody id="historyBody"></tbody></table>
</div>

<script>
const ALL_CHARS = [];
for(let i=0;i<10;i++) ALL_CHARS.push(String(i));
for(let c=65;c<=90;c++) ALL_CHARS.push(String.fromCharCode(c));
for(let c=97;c<=122;c++) ALL_CHARS.push(String.fromCharCode(c));
const TOTAL=36, MAX=200;

function makeState(){
  return {
    phase:'find_chars',
    tries:0,
    locked:{},
    confirmedChars:new Set(),
    candidateChars:new Set(),
    excludedChars:new Set(),
    testedChars:new Set(),
    charTriedPositions:{},
    posTriedChars:{},
    charScore:{},          // 字元加權分數 (累積 A+B)
    charCount:{},          // 字元出現次數
    bestAB:0,              // 歷史最佳 A+B
    stagnantRounds:0,      // 連續無進展回合
    history:[],
    testedBatches:[],
    lastA:0,
    nextGuess:'',
    findRound:0,
  };
}
let state = makeState();

function addResult(){
  const g=document.getElementById('guessInput').value.trim();
  const A=parseInt(document.getElementById('AInput').value);
  const B=parseInt(document.getElementById('BInput').value);
  const w=document.getElementById('warnMsg'); w.textContent='';
  if(g.length!==TOTAL){w.textContent='字串長度必須為36';return}
  if(isNaN(A)||isNaN(B)){w.textContent='請輸入A和B';return}
  if(A+B>TOTAL){w.textContent='A+B不能超過36';return}

  state.tries++;
  state.history.push({guess:g,A,B,total:A+B});
  const chars=g.split('');
  chars.forEach(c=>state.testedChars.add(c));
  state.testedBatches.push({chars:new Set(chars),total:A+B});

  // 位置追蹤不分階段都要記錄
  chars.forEach((ch,pos)=>{
    if(!state.charTriedPositions[ch])state.charTriedPositions[ch]=new Set();
    if(!state.posTriedChars[pos])state.posTriedChars[pos]=new Set();
    state.charTriedPositions[ch].add(pos);
    state.posTriedChars[pos].add(ch);
  });

  // 加權分數追蹤
  const ab = A+B;
  chars.forEach(ch => {
    state.charScore[ch] = (state.charScore[ch]||0) + ab;
    state.charCount[ch] = (state.charCount[ch]||0) + 1;
  });

  // 停滯偵測
  if(ab > state.bestAB){ state.bestAB = ab; state.stagnantRounds = 0; }
  else { state.stagnantRounds++; }

  if(state.phase==='find_chars'){
    if(A+B===TOTAL){
      state.confirmedChars=new Set(chars);
      state.candidateChars=new Set(chars);
      ALL_CHARS.forEach(c=>{if(!state.confirmedChars.has(c))state.excludedChars.add(c)});
      state.phase='locate';
    }
    state.findRound++;
  }

  state.lastA=A;
  document.getElementById('guessInput').value='';
  document.getElementById('AInput').value='';
  document.getElementById('BInput').value='';
  genNext();
  renderAll();
}

function genNext(){
  if(state.phase==='find_chars'){
    state.nextGuess=genFindGuess();
  }else{
    state.nextGuess=genLocateGuess();
  }
  renderNextGuess();
}

function genFindGuess(){
  // 階段1: 仍有未測試字元 → 均勻取樣（數字/大寫/小寫各約1/3）
  const untested=ALL_CHARS.filter(c=>!state.testedChars.has(c)&&!state.excludedChars.has(c));
  if(untested.length>=TOTAL){
    const nums=untested.filter(c=>c>='0'&&c<='9');
    const uppers=untested.filter(c=>c>='A'&&c<='Z');
    const lowers=untested.filter(c=>c>='a'&&c<='z');
    const result=[];
    const pool=[...nums,...uppers,...lowers];
    // 依序從三類各取一個，確保均衡
    let ni=0, ui=0, li=0;
    while(result.length<TOTAL){
      if(ni<nums.length) result.push(nums[ni++]);
      if(result.length>=TOTAL) break;
      if(ui<uppers.length) result.push(uppers[ui++]);
      if(result.length>=TOTAL) break;
      if(li<lowers.length) result.push(lowers[li++]);
    }
    return result.join('');
  }

  // 階段2: 所有字元已測 → 加權評分策略
  const candidates = [...state.testedChars].filter(c=>!state.excludedChars.has(c));

  // 計算每個字元的平均分 (charScore / charCount)，排除從未出現的字元
  const scored = candidates.map(ch => ({
    ch,
    avg: (state.charScore[ch]||0) / (state.charCount[ch]||1),
    cnt: state.charCount[ch]||0
  }));

  // 依平均分降序排列
  scored.sort((a,b) => b.avg - a.avg);

  // 策略A: 停滯≥3輪 → 排除法：踢掉分數最低的 N 個，換入低頻字元
  if(state.stagnantRounds >= 3 && state.tries > 5){
    const dropN = Math.max(1, Math.min(8, Math.floor(state.stagnantRounds / 2)));
    const keep = scored.slice(0, scored.length - dropN).map(x => x.ch);
    // 從低分字元+未充分測試的字元中補
    const lowScored = scored.slice(-dropN).map(x => x.ch);
    const untestedLow = ALL_CHARS.filter(c => !keep.includes(c) && !state.excludedChars.has(c));
    const pool = new Set(keep);
    for(const ch of untestedLow){
      if(pool.size >= TOTAL) break;
      pool.add(ch);
    }
    // 如果還不夠，從低分中補
    for(const ch of lowScored){
      if(pool.size >= TOTAL) break;
      pool.add(ch);
    }
    const result = [...pool];
    // 隨機打亂
    for(let i=result.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[result[i],result[j]]=[result[j],result[i]]; }
    return result.slice(0,TOTAL).join('');
  }

  // 策略B: 取加權分 Top36，輕微打亂增加多樣性
  const top = scored.slice(0, TOTAL).map(x => x.ch);
  // 隨機打亂（保留高分字元，只是變換排列順序）
  for(let i=top.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[top[i],top[j]]=[top[j],top[i]]; }
  const result = top.slice(0, TOTAL);
  return result.join('');
}

function genLocateGuess(){
  const chars=[...state.confirmedChars];
  if(!chars.length)return genFindGuess();
  const result=Array(TOTAL).fill(null);
  for(const [pos,ch] of Object.entries(state.locked))result[parseInt(pos)]=ch;
  const lockedChars=new Set(Object.values(state.locked));
  const remChars=chars.filter(c=>!lockedChars.has(c));
  const remPos=[]; for(let i=0;i<TOTAL;i++)if(!(i in state.locked))remPos.push(i);

  const used=new Set();
  for(const pos of remPos){
    const triedHere=state.posTriedChars[pos]||new Set();
    for(const ch of remChars){
      if(!used.has(ch)&&!triedHere.has(ch)){
        result[pos]=ch; used.add(ch); break;
      }
    }
  }
  const unfilled=remPos.filter(p=>result[p]===null);
  const unused=remChars.filter(c=>!used.has(c));
  for(let i=0;i<unfilled.length&&i<unused.length;i++)result[unfilled[i]]=unused[i];
  const stillNull=remPos.filter(p=>result[p]===null);
  const stillFree=chars.filter(c=>!result.includes(c));
  for(let i=0;i<stillNull.length&&i<stillFree.length;i++)result[stillNull[i]]=stillFree[i];
  return result.join('');
}

function copyGuess(){
  if(state.nextGuess)navigator.clipboard.writeText(state.nextGuess);
}

function renderAll(){
  document.getElementById('stTries').textContent=state.tries;
  document.getElementById('stRemain').textContent=MAX-state.tries;
  document.getElementById('stFound').textContent=state.confirmedChars.size;
  document.getElementById('stLocked').textContent=Object.keys(state.locked).length;
  document.getElementById('progressBar').style.width=(state.tries/MAX*100)+'%';
  const tag=document.getElementById('phaseTag');
  if(state.phase==='find_chars'){tag.textContent='找字元階段';tag.className='phase-tag phase-find'}
  else{tag.textContent='定位階段';tag.className='phase-tag phase-locate'}
  renderCharGrid();
  renderPosGrid();
  renderHistory();
}

function renderCharGrid(){
  const grid=document.getElementById('charGrid');
  let html='';
  for(const ch of ALL_CHARS){
    let cls='char-box';
    const vals=Object.values(state.locked);
    if(vals.includes(ch))cls+=' locked';
    else if(state.confirmedChars.has(ch))cls+=' confirmed';
    else if(state.candidateChars.has(ch))cls+=' candidate';
    else if(state.excludedChars.has(ch))cls+=' excluded';
    else if(state.testedChars.has(ch))cls+=' tested';
    html+=`<div class="${cls}">${ch}</div>`;
  }
  grid.innerHTML=html;
}

function renderPosGrid(){
  const grid=document.getElementById('posGrid');
  let html='';
  for(let pos=0;pos<TOTAL;pos++){
    let cls='pos-cell';
    if(state.locked[pos]!==undefined)cls+=' locked-pos';
    const lk=state.locked[pos]||'';
    const ts=state.posTriedChars[pos]||new Set();
    const arr=[...ts].sort();
    html+=`<div class="${cls}"><div class="pos-num">#${pos}</div>`;
    if(lk)html+=`<div class="pos-locked">${lk}</div>`;
    if(arr.length)html+=`<div class="pos-chars">${arr.join('')}</div>`;
    html+=`</div>`;
  }
  grid.innerHTML=html;
}

function renderHistory(){
  const tbody=document.getElementById('historyBody');
  let html='';
  for(let i=state.history.length-1;i>=0;i--){
    const h=state.history[i];
    html+=`<tr><td>${i+1}</td><td class="guess-str">${h.guess}</td>
      <td><span class="badge badge-a">${h.A}A</span></td>
      <td><span class="badge badge-b">${h.B}B</span></td>
      <td>${h.total}</td></tr>`;
  }
  tbody.innerHTML=html;
}

function renderNextGuess(){
  const div=document.getElementById('nextGuess');
  if(!state.nextGuess){div.textContent='點擊「重新生成建議」';return}
  let html='';
  for(let i=0;i<state.nextGuess.length;i++){
    const ch=state.nextGuess[i];
    let cls=state.locked[i]===ch?'locked-pos':'new-pos';
    html+=`<span class="${cls}">${ch}</span>`;
  }
  div.innerHTML=html;

  // 策略提示
  const hint=document.getElementById('strategyHint');
  if(state.phase==='find_chars'){
    const untested=ALL_CHARS.filter(c=>!state.testedChars.has(c)&&!state.excludedChars.has(c));
    if(untested.length>=TOTAL) hint.textContent='策略：優先使用未測試字元';
    else if(state.stagnantRounds>=3) hint.textContent=`策略：排除法 (停滯${state.stagnantRounds}輪，最佳A+B=${state.bestAB})`;
    else hint.textContent=`策略：加權評分 Top36 (最佳A+B=${state.bestAB}，停滯${state.stagnantRounds}輪)`;
  }else{
    hint.textContent=`策略：避開已試位置的定位 (已鎖定${Object.keys(state.locked).length}/36)`;
  }
}

// Init
genNext();
renderAll();
</script>
</body>
</html>
